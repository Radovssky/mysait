# Локально удобно поднимать только postgres (`docker compose up -d postgres`),
# а web запускать рядом через `pnpm dev` для быстрого HMR.
# Production-сборка: `docker compose --profile prod up -d --build`
# (postgres + web + caddy с автоHTTPS).

services:
  postgres:
    image: postgres:16-alpine
    container_name: mysait-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mysait}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mysait}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mysait} -d ${POSTGRES_DB:-mysait}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mysait-web
    environment:
      NODE_ENV: production
      # Внутри docker-сети хост postgres = имя сервиса, поэтому собираем URL
      # здесь, а не из .env (там DATABASE_URL под локальный pnpm dev).
      DATABASE_URL: postgresql://${POSTGRES_USER:-mysait}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mysait}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SITE_URL: ${SITE_URL:-${NEXTAUTH_URL}}
      UPLOADS_DIR: /var/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/var/data/uploads
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-4",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  caddy:
    # Caddy опциональный — на JustHost VPS уже nginx+certbot,
    # поэтому в проде Caddy не поднимается. Локально для проверки HTTPS:
    # docker compose --profile prod --profile caddy up -d
    profiles: ["caddy"]
    image: caddy:2-alpine
    container_name: mysait-caddy
    environment:
      CADDY_HOST: ${CADDY_HOST:-:80}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-dev@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  uploads:
  caddy_data:
  caddy_config:
